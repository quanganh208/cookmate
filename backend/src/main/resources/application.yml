spring:
  application:
    name: cookmate
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/cookmate}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  servlet:
    multipart:
      # Upload endpoint (/api/uploads/image) accepts up to 5 MB images. max-request-size has
      # 1 MB of headroom for multipart boundary overhead.
      max-file-size: 5MB
      max-request-size: 6MB
      # Force disk buffering so Tomcat doesn't hold multipart bodies in heap — prevents OOM
      # under concurrent uploads.
      file-size-threshold: 0
      location: ${java.io.tmpdir}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /

app:
  auth:
    # Shared with mobile via EXPO_PUBLIC_API_KEY in root .env so both sides
    # read the exact same value (avoids drift between client header and server check).
    api-key: ${EXPO_PUBLIC_API_KEY:dev-api-key-change-in-production}
    jwt:
      secret: ${JWT_SECRET:dev-jwt-secret-must-be-at-least-64-characters-long-for-hmac-sha512-signing}
      access-token-expiration: 900000
      refresh-token-expiration: 2592000000
    google:
      # Same web client ID the mobile SDK requests tokens with → audience match.
      client-id: ${EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID:}
  mail:
    from: ${MAIL_FROM:noreply@cookmate.app}
    from-name: ${MAIL_FROM_NAME:Cookmate}
  password-reset:
    token-ttl-minutes: 15
    base-url: cookmate://reset
    rate-limit:
      max-requests: 3
      window-minutes: 60
  # Cloudflare R2 image storage. Provisioned per-deployment in .env; defaults below are
  # harmless placeholders so tests (and dev runs without R2 configured) don't fail at boot.
  # R2Service.putObject/deleteObject will throw at first real call if creds are still defaults.
  r2:
    endpoint: ${R2_ENDPOINT:http://localhost:9000}
    bucket: ${R2_BUCKET:cookmate-test}
    access-key-id: ${R2_ACCESS_KEY_ID:dev-access-key}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:dev-secret-key}
    public-url: ${R2_PUBLIC_URL:http://localhost:9000/cookmate-test}
  upload:
    rate-limit:
      max-requests: 20
      window-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info
