services:
  mongodb:
    image: mongo:8.0
    container_name: cookmate-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cookmate-network

  api-server:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: cookmate-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - MONGODB_URI=mongodb://mongodb:27017/cookmate
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - cookmate-network

volumes:
  mongodb_data:

networks:
  cookmate-network:
    driver: bridge
